name: Gate Evaluation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: "Run a specific profile only (leave empty for all)"
        required: false
        type: choice
        options:
          - ""
          - default
          - crewai
          - langgraph
          - dspy

jobs:
  gate-eval:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [default, crewai, langgraph, dspy]
    name: Gate eval (${{ matrix.profile }})

    steps:
      - name: Checkout bench repo
        uses: actions/checkout@v4

      - name: Checkout agent-vitals (sibling)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/agent-vitals
          path: agent-vitals
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e "./agent-vitals[dev]"
          pip install -e ".[dev]"

      - name: Run gate evaluation
        id: gate
        run: |
          if [ "${{ matrix.profile }}" = "default" ]; then
            make evaluate CORPUS=v1
          else
            make evaluate CORPUS=v1 PROFILE=${{ matrix.profile }}
          fi

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-report-${{ matrix.profile }}
          path: reports/eval-*.md
          retention-days: 30

  gate-summary:
    needs: gate-eval
    if: always()
    runs-on: ubuntu-latest
    name: Gate summary
    steps:
      - name: Check gate results
        run: |
          if [ "${{ needs.gate-eval.result }}" = "failure" ]; then
            echo "::error::One or more gate evaluations failed. Check individual profile results."
            exit 1
          fi
          echo "All gate evaluations passed."
